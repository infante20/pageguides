<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entity Encoder/Decoder — PageGuides</title>
    <meta name="description" content="Safely encode and decode HTML entities. Convert special characters to HTML entities or back to plain text for web development and security.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --code-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        nav {
            max-width: 800px;
            margin: 0 auto 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span { color: var(--primary); }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .back-link:hover { color: var(--text); }

        main {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            padding: 1rem;
            font-family: 'Fira Code', 'Monaco', 'Consolas', monospace;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .action-bars {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-color: var(--border);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
        }

        .output-container {
            position: relative;
        }

        .stats {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: none;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        @media (max-width: 640px) {
            .action-bars {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            Page<span>Guides</span>
        </a>
        <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Tools
        </a>
    </nav>

    <main>
        <div class="hero">
            <h1>HTML Entity Encoder/Decoder</h1>
            <p class="subtitle">Convert special characters to their HTML entity equivalents for safe web display, or decode entities back to plain text.</p>
        </div>

        <div id="alert" class="alert alert-success">Copied to clipboard!</div>

        <div class="tool-card">
            <div class="input-group">
                <label>Input Text / HTML</label>
                <textarea id="input" placeholder="Paste your text or HTML entities here..."></textarea>
            </div>

            <div class="action-bars">
                <button class="btn btn-primary" onclick="encode()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
                    Encode to Entities
                </button>
                <button class="btn btn-primary" onclick="decode()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6l-6 6 6 6M16 18l6-6-6-6"/></svg>
                    Decode to Text
                </button>
            </div>

            <div class="input-group output-container">
                <label>Result</label>
                <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
                <button class="btn btn-outline copy-btn" onclick="copyOutput()">Copy</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Length</span>
                    <span id="charCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Entities Found</span>
                    <span id="entityCount" class="stat-value">0</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const charCount = document.getElementById('charCount');
        const entityCount = document.getElementById('entityCount');
        const alert = document.getElementById('alert');

        function encode() {
            const str = input.value;
            const res = str.replace(/[\u00A0-\u9999<>\&]/gim, function(i) {
                return '&#' + i.charCodeAt(0) + ';';
            });
            output.value = res;
            updateStats();
        }

        function decode() {
            const str = input.value;
            const res = str.replace(/&#(\d+);/g, function(match, dec) {
                return String.fromCharCode(dec);
            }).replace(/&[a-z]+;/gi, function(match) {
                const doc = new DOMParser().parseFromString(match, 'text/html');
                return doc.documentElement.textContent;
            });
            output.value = res;
            updateStats();
        }

        function updateStats() {
            charCount.textContent = output.value.length;
            const entities = output.value.match(/&[#a-zA-Z0-9]+;/g);
            entityCount.textContent = entities ? entities.length : 0;
        }

        function copyOutput() {
            if (!output.value) return;
            navigator.clipboard.writeText(output.value);
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 2000);
        }

        input.addEventListener('input', () => {
             charCount.textContent = input.value.length;
        });
    </script>
</body>
</html>

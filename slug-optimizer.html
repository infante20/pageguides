<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slug Optimizer — PageGuides</title>
    <meta name="description" content="Transform long titles into clean, keyword-rich, and SEO-friendly URL slugs.">
    <style>
        :root {
            --primary: #2dd4bf;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(45, 212, 191, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 700px; }

        .header { text-align: left; margin-bottom: 3rem; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .logo span { color: var(--primary); }
        .title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; }
        input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; color: white; font-size: 1.2rem; outline: none; margin-bottom: 2rem; }

        .result-box { background: rgba(45, 212, 191, 0.1); border: 1px dashed var(--primary); padding: 1.5rem; border-radius: 1rem; text-align: center; }
        #slug { color: var(--primary); font-family: 'Fira Code', monospace; font-weight: 700; font-size: 1.1rem; word-break: break-all; }

        .copy-btn { background: var(--primary); color: #0f172a; border: none; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 900; margin-top: 1rem; cursor: pointer; }

        footer { margin-top: 4rem; color: var(--text-dim); font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="logo">Page<span>Guides</span></a>
            <h1 class="title">URL Slug Optimizer</h1>
            <p class="subtitle">Clean up your URLs for better click-through rates and clarity.</p>
        </header>

        <div class="card">
            <label>Article or Page Title</label>
            <input type="text" id="input" placeholder="e.g. 10 Best SEO Tips for 2026!" oninput="generate()">

            <div class="result-box">
                <label style="color: var(--primary);">OPTIMIZED SLUG</label>
                <div id="slug">optimized-slug-here</div>
                <button class="copy-btn" onclick="copySlug()">COPY SLUG</button>
            </div>
        </div>

        <footer>
            &copy; 2026 PageGuides — Premium SEO Tool Suite
        </footer>
    </div>

    <script>
        function generate() {
            const input = document.getElementById('input').value;
            const slug = input.toLowerCase()
                .trim()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
            
            document.getElementById('slug').textContent = slug || 'waiting for input...';
        }

        function copySlug() {
            const s = document.getElementById('slug').textContent;
            navigator.clipboard.writeText(s);
            alert('Slug copied!');
        }
    </script>
</body>
</html>

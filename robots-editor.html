<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robots.txt Validator & Editor — PageGuides</title>
    <meta name="description" content="Validate and edit your robots.txt file to ensure search engines crawl your site correctly.">
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 1000px; }

        .header { text-align: left; margin-bottom: 3rem; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .logo span { color: var(--primary); }
        .title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .editor-container { display: grid; grid-template-columns: 1fr 300px; gap: 2rem; }
        
        .main-editor {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            color: #d1d5db;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            outline: none;
            resize: none;
            line-height: 1.5;
        }

        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .side-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
        .side-title { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 0.1em; }

        .btn { background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 0.5rem; cursor: pointer; font-weight: 700; width: 100%; margin-top: 0.5rem; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: white; margin-top: 0.5rem; }

        .status { padding: 1rem; border-radius: 0.75rem; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 600; }
        .status.ok { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }

        footer { margin-top: 4rem; color: var(--text-dim); font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="logo">Page<span>Guides</span></a>
            <h1 class="title">Robots.txt Validator & Editor</h1>
            <p class="subtitle">Fine-tune your crawling preferences and exclude sensitive paths.</p>
        </header>

        <div class="editor-container">
            <div class="main-editor">
                <textarea id="editor" oninput="validate()">User-agent: *
Disallow: /wp-admin/
Allow: /wp-admin/admin-ajax.php

Sitemap: https://example.com/sitemap.xml</textarea>
                <div id="status" class="status ok">✓ Basic syntax looks good</div>
            </div>

            <div class="sidebar">
                <div class="side-card">
                    <div class="side-title">PRESETS</div>
                    <button class="btn btn-ghost" onclick="setPreset('wp')">WordPress Default</button>
                    <button class="btn btn-ghost" onclick="setPreset('block')">Block Everything</button>
                    <button class="btn btn-ghost" onclick="setPreset('clean')">Allow All</button>
                </div>

                <div class="side-card">
                    <div class="side-title">ACTIONS</div>
                    <button class="btn" onclick="copyCode()">Copy to Clipboard</button>
                    <button class="btn btn-ghost" onclick="download()">Download txt</button>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 PageGuides — Premium SEO Tool Suite
        </footer>
    </div>

    <script>
        function validate() {
            const val = document.getElementById('editor').value;
            const status = document.getElementById('status');
            
            if (!val.includes('User-agent:')) {
                status.textContent = "⚠ Missing 'User-agent:' directive";
                status.className = "status";
                status.style.background = "rgba(245, 158, 11, 0.1)";
                status.style.color = "#f59e0b";
            } else {
                status.textContent = "✓ Basic syntax looks good";
                status.className = "status ok";
            }
        }

        function setPreset(type) {
            const editor = document.getElementById('editor');
            if (type === 'wp') {
                editor.value = "User-agent: *\nDisallow: /wp-admin/\nAllow: /wp-admin/admin-ajax.php\n\nSitemap: https://example.com/sitemap.xml";
            } else if (type === 'block') {
                editor.value = "User-agent: *\nDisallow: /";
            } else {
                editor.value = "User-agent: *\nDisallow:";
            }
            validate();
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('editor').value);
            alert('Copied!');
        }

        function download() {
            const blob = new Blob([document.getElementById('editor').value], {type: 'text/plain'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'robots.txt';
            a.click();
        }
    </script>
</body>
</html>

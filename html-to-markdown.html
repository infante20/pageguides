<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to Markdown Converter — PageGuides</title>
    <meta name="description" content="Convert HTML code to Markdown instantly. Perfect for migrating content to static sites, documentation, or CMS platforms like Hugo and Jekyll.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --code-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        nav {
            max-width: 1000px;
            margin: 0 auto 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span { color: var(--primary); }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .back-link:hover { color: var(--text); }

        main {
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            display: block;
        }

        textarea {
            flex: 1;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            padding: 1rem;
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .btn-action {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .copy-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 99px;
            font-weight: 600;
            transition: transform 0.3s;
            z-index: 100;
        }

        .copy-toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 800px) {
            .tool-grid { grid-template-columns: 1fr; }
            .card { height: 400px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            Page<span>Guides</span>
        </a>
        <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Tools
        </a>
    </nav>

    <main>
        <div class="hero">
            <h1>HTML to Markdown Converter</h1>
            <p class="subtitle">Clean, simple conversion from HTML to Markdown. Perfect for writing documentation or migrating content between platforms.</p>
        </div>

        <div class="tool-grid">
            <div class="card">
                <div class="card-header">
                    <label>HTML Source</label>
                    <button class="btn-action" onclick="clearAll()">Clear</button>
                </div>
                <textarea id="htmlInput" placeholder="<h1>Hello World</h1><p>Paste your HTML here...</p>"></textarea>
            </div>

            <div class="card">
                <div class="card-header">
                    <label>Markdown Output</label>
                    <button class="btn-action" onclick="copyOutput()">Copy</button>
                </div>
                <textarea id="markdownOutput" readonly placeholder="# Hello World\n\nResult will appear here..."></textarea>
            </div>
        </div>
    </main>

    <div id="toast" class="copy-toast">Copied to clipboard!</div>

    <script>
        const turndownService = new TurndownService({
            headingStyle: 'atx',
            codeBlockStyle: 'fenced'
        });

        const htmlInput = document.getElementById('htmlInput');
        const markdownOutput = document.getElementById('markdownOutput');
        const toast = document.getElementById('toast');

        htmlInput.addEventListener('input', () => {
            const html = htmlInput.value;
            if (!html) {
                markdownOutput.value = '';
                return;
            }
            try {
                const markdown = turndownService.turndown(html);
                markdownOutput.value = markdown;
            } catch (e) {
                markdownOutput.value = 'Error converting HTML: ' + e.message;
            }
        });

        function clearAll() {
            htmlInput.value = '';
            markdownOutput.value = '';
        }

        function copyOutput() {
            if (!markdownOutput.value) return;
            navigator.clipboard.writeText(markdownOutput.value);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>

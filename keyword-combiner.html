<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Combiner — PageGuides</title>
    <meta name="description"
        content="Free Keyword Combiner Tool. Merge up to three lists of words to quickly generate thousands of keyword combinations for SEO and PPC campaigns.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --bg-dark: #050508;
            --bg-light: #111827;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top center, var(--bg-light) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(12px);
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span { color: var(--accent); }

        .back-link {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
            font-weight: 500;
        }

        .back-link:hover { color: var(--text); }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: 4rem auto 6rem;
            padding: 0 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .tool-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.05));
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), 0 8px 16px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: clamp(2rem, 4vw, 2.75rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
            line-height: 1.5;
        }

        /* CARD */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* GRID INPUTS */
        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .inputs-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .input-col {
            display: flex;
            flex-direction: column;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            resize: vertical;
            min-height: 200px;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(16,185,129,0.5);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* BUTTONS */
        .actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            background: #0ea5e9; /* Switching to a nice blue on hover for primary? Let's keep accent green */
            background: #34d399;
            transform: translateY(-1px);
        }

        /* RESULTS */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .results-count {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
        }

        .output-wrapper {
            position: relative;
        }

        #outCombinations {
            min-height: 300px;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(5, 5, 8, 0.8);
            cursor: auto;
        }

        .btn-copy {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-copy:hover {
            background: var(--accent);
            color: #000;
        }

    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            PageGuides<span>.</span>
        </a>
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            All Tools
        </a>
    </nav>

    <main class="container">
        <header>
            <div class="tool-icon">🔄</div>
            <h1>Keyword Combiner</h1>
            <p class="subtitle">Merge up to three lists of words to quickly generate thousands of keyword combinations for your SEO and PPC campaigns.</p>
        </header>

        <div class="card">
            <div class="card-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
                Keyword Lists (One per line)
            </div>
            
            <div class="inputs-grid">
                <div class="input-col">
                    <label>List 1</label>
                    <textarea id="inList1" placeholder="e.g.&#10;buy&#10;cheap&#10;best"></textarea>
                </div>
                <div class="input-col">
                    <label>List 2</label>
                    <textarea id="inList2" placeholder="e.g.&#10;shoes&#10;sneakers&#10;boots"></textarea>
                </div>
                <div class="input-col">
                    <label>List 3 (Optional)</label>
                    <textarea id="inList3" placeholder="e.g.&#10;online&#10;near me&#10;for men"></textarea>
                </div>
            </div>

            <div class="actions">
                <button class="btn" id="btnClear">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Clear All
                </button>
                <button class="btn btn-primary" id="btnCombine">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>
                    Combine Keywords
                </button>
            </div>
        </div>

        <div class="card" id="resultsCard" style="display: none;">
            <div class="results-header">
                <div class="card-title" style="margin-bottom: 0;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Generated Combinations
                </div>
                <span class="results-count" id="resultsCount">0 combinations found</span>
            </div>

            <div class="output-wrapper">
                <button class="btn-copy" id="btnCopy">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy All
                </button>
                <textarea id="outCombinations" readonly placeholder="Combinations will appear here..."></textarea>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inList1 = document.getElementById('inList1');
            const inList2 = document.getElementById('inList2');
            const inList3 = document.getElementById('inList3');
            const btnCombine = document.getElementById('btnCombine');
            const btnClear = document.getElementById('btnClear');
            const resultsCard = document.getElementById('resultsCard');
            const outCombinations = document.getElementById('outCombinations');
            const resultsCount = document.getElementById('resultsCount');
            const btnCopy = document.getElementById('btnCopy');

            function getListNodes(textarea) {
                return textarea.value.split('\n')
                    .map(w => w.trim())
                    .filter(w => w.length > 0);
            }

            function combine() {
                const arr1 = getListNodes(inList1);
                const arr2 = getListNodes(inList2);
                const arr3 = getListNodes(inList3);

                // Need at least one populated list to combine with something else,
                // Or if only 1 is populated, we just output it.
                let arraysToCombine = [arr1, arr2, arr3].filter(arr => arr.length > 0);
                
                if (arraysToCombine.length === 0) {
                    alert('Please enter keywords in at least one list.');
                    return;
                }

                let results = arraysToCombine[0];
                for (let i = 1; i < arraysToCombine.length; i++) {
                    let temp = [];
                    for (let r of results) {
                        for (let t of arraysToCombine[i]) {
                            temp.push(`${r} ${t}`);
                        }
                    }
                    results = temp;
                }

                outCombinations.value = results.join('\n');
                resultsCount.textContent = `${results.length} combination${results.length !== 1 ? 's' : ''} generated`;
                resultsCard.style.display = 'flex';
                
                resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            btnCombine.addEventListener('click', combine);

            btnClear.addEventListener('click', () => {
                inList1.value = '';
                inList2.value = '';
                inList3.value = '';
                resultsCard.style.display = 'none';
                outCombinations.value = '';
            });

            btnCopy.addEventListener('click', () => {
                navigator.clipboard.writeText(outCombinations.value).then(() => {
                    const originalHTML = btnCopy.innerHTML;
                    btnCopy.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
                    btnCopy.style.background = 'var(--accent)';
                    btnCopy.style.color = '#000';
                    
                    setTimeout(() => {
                        btnCopy.innerHTML = originalHTML;
                        btnCopy.style.background = '';
                        btnCopy.style.color = '';
                    }, 2000);
                });
            });
        });
    </script>
</body>
</html>

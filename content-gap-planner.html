<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Gap Planner — PageGuides</title>
    <meta name="description" content="Identify keywords and topics your competitors are ranking for to find new content opportunities.">
    <style>
        :root {
            --primary: #2dd4bf;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(45, 212, 191, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 900px; }

        .header { text-align: left; margin-bottom: 3rem; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .logo span { color: var(--primary); }
        .title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2.5rem; }
        
        .io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        textarea { width: 100%; height: 300px; background: #000; border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; color: #fff; font-family: monospace; resize: none; outline: none; }
        
        .btn { background: var(--primary); color: #000; border: none; padding: 1rem; border-radius: 0.5rem; font-weight: 900; cursor: pointer; margin-top: 1.5rem; width: 100%; }

        table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        th { text-align: left; padding: 1rem; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .badge { background: rgba(45,212,191,0.1); color: var(--primary); padding: 0.2rem 0.5rem; border-radius: 0.3rem; font-size: 0.75rem; font-weight: 700; }

        footer { margin-top: 4rem; color: var(--text-dim); font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="logo">Page<span>Guides</span></a>
            <h1 class="title">Content Gap Planner</h1>
            <p class="subtitle">Identify missing opportunities in your content strategy.</p>
        </header>

        <div class="card">
            <div class="io-grid">
                <div>
                    <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin-bottom: 0.5rem;">COMPETITOR KEYWORDS</label>
                    <textarea id="comp" placeholder="best seo tools&#10;backlink audit template&#10;how to rank on google"></textarea>
                </div>
                <div>
                    <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin-bottom: 0.5rem;">YOUR KEYWORDS</label>
                    <textarea id="mine" placeholder="best seo tools&#10;local seo guide"></textarea>
                </div>
            </div>
            
            <button class="btn" onclick="analyze()">ANALYZE CONTENT GAP</button>

            <div id="results" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Missing Topic</th>
                            <th>Priority</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>

        <footer>
            &copy; 2026 PageGuides — Premium SEO Tool Suite
        </footer>
    </div>

    <script>
        function analyze() {
            const comp = document.getElementById('comp').value.split('\n').map(s => s.trim().toLowerCase()).filter(s => s);
            const mine = new Set(document.getElementById('mine').value.split('\n').map(s => s.trim().toLowerCase()).filter(s => s));

            const gap = comp.filter(k => !mine.has(k));
            
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = gap.map(k => `
                <tr>
                    <td>${k}</td>
                    <td><span class="badge">HIGH</span></td>
                </tr>
            `).join('') || '<tr><td colspan="2" style="text-align:center">No gap found! You are covering everything.</td></tr>';

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>

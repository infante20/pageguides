<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Gap Analyzer — PageGuides</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .gap-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 0.95rem;
            resize: none;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn {
            background: var(--accent);
            color: #064e3b;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .results-section {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-cols {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .keyword-list-result {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .list-header {
            font-size: 0.9rem;
            margin: 0 0 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-badge {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .k-item {
            font-size: 0.9rem;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 5px;
            border-radius: 6px;
            color: var(--text-main);
        }

        .intersection { color: #facc15; }
        .gap { color: #f87171; }
        .shared { color: #34d399; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← All Tools</a>
        
        <div class="header">
            <h1>Keyword Gap Analyzer</h1>
            <p style="color: var(--text-dim)">Identify missing keyword opportunities by comparing your list against your competitors.</p>
        </div>

        <div class="tool-card">
            <div class="gap-grid">
                <div>
                    <label>Your Keywords (one per line)</label>
                    <textarea id="my-keywords" placeholder="seo tools&#10;free metadata generator&#10;content optimization"></textarea>
                </div>
                <div>
                    <label>Competitor Keywords (one per line)</label>
                    <textarea id="comp-keywords" placeholder="seo audit tool&#10;seo tools&#10;backlink checker&#10;keyword research"></textarea>
                </div>
            </div>
            <button class="btn" onclick="analyzeGap()">Analyze Opportunities</button>

            <div id="results-section" class="results-section">
                <div class="result-cols">
                    <div class="keyword-list-result">
                        <div class="list-header">
                            <span class="gap">Missing Opportunities</span>
                            <span id="gap-count" class="count-badge" style="background: rgba(248, 113, 113, 0.2); color: #f87171;">0</span>
                        </div>
                        <div id="gap-list"></div>
                    </div>
                    
                    <div class="keyword-list-result">
                        <div class="list-header">
                            <span class="shared">Shared Keywords</span>
                            <span id="shared-count" class="count-badge">0</span>
                        </div>
                        <div id="shared-list"></div>
                    </div>

                    <div class="keyword-list-result">
                        <div class="list-header">
                            <span style="color: var(--text-dim)">Unique to You</span>
                            <span id="unique-count" class="count-badge" style="background: rgba(255, 255, 255, 0.1); color: var(--text-dim);">0</span>
                        </div>
                        <div id="unique-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function analyzeGap() {
            const myRaw = document.getElementById('my-keywords').value.toLowerCase().split('\n').map(k => k.trim()).filter(k => k.length > 0);
            const compRaw = document.getElementById('comp-keywords').value.toLowerCase().split('\n').map(k => k.trim()).filter(k => k.length > 0);

            const mySet = new Set(myRaw);
            const compSet = new Set(compRaw);

            const missing = compRaw.filter(k => !mySet.has(k));
            const shared = compRaw.filter(k => mySet.has(k));
            const unique = myRaw.filter(k => !compSet.has(k));

            renderList('gap-list', missing, 'gap');
            renderList('shared-list', shared, 'shared');
            renderList('unique-list', unique, '');

            document.getElementById('gap-count').innerText = missing.length;
            document.getElementById('shared-count').innerText = shared.length;
            document.getElementById('unique-count').innerText = unique.length;

            document.getElementById('results-section').style.display = 'block';
        }

        function renderList(id, items, cls) {
            const container = document.getElementById(id);
            if (items.length === 0) {
                container.innerHTML = '<div style="color: var(--text-dim); font-size: 0.8rem; text-align: center; padding: 20px;">No items found</div>';
                return;
            }
            container.innerHTML = [...new Set(items)].map(i => `<div class="k-item ${cls}">${i}</div>`).join('');
        }
    </script>
</body>
</html>

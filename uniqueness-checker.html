<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Uniqueness Checker — PageGuides</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .input-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 0.95rem;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn {
            background: var(--accent);
            color: #064e3b;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .result-view {
            margin-top: 40px;
            display: none;
            text-align: center;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .perc-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 6px solid var(--accent);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .details {
            font-size: 1.1rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← All Tools</a>
        
        <div class="header">
            <h1>Content Uniqueness Checker</h1>
            <p style="color: var(--text-dim)">Compare two blocks of text to detect plagiarism or similarity levels using shingle-based comparison.</p>
        </div>

        <div class="tool-card">
            <div class="input-pair">
                <div>
                    <label style="display:block; margin-bottom:8px; font-size:0.8rem; color:var(--text-dim);">Source Content</label>
                    <textarea id="text1" placeholder="Paste original content here..."></textarea>
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-size:0.8rem; color:var(--text-dim);">Content to Compare</label>
                    <textarea id="text2" placeholder="Paste the content you want to compare..."></textarea>
                </div>
            </div>
            <button class="btn" onclick="checkUniqueness()">Check Similarity</button>

            <div id="result-view" class="result-view">
                <div id="perc-circle" class="perc-circle">0%</div>
                <div class="details">
                    <h2 id="summary-text" style="color: white; margin: 0 0 10px 0;">Unique Content</h2>
                    <p id="sub-details">Similarity: 0% Match</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkUniqueness() {
            const t1 = document.getElementById('text1').value.toLowerCase().trim();
            const t2 = document.getElementById('text2').value.toLowerCase().trim();

            if (!t1 || !t2) return;

            // Simplified shingle comparison (3-word overlap)
            const shingles1 = getShingles(t1, 3);
            const shingles2 = getShingles(t2, 3);

            const set1 = new Set(shingles1);
            let matches = 0;
            shingles2.forEach(s => {
                if (set1.has(s)) matches++;
            });

            const similarity = Math.round((matches / Math.max(shingles1.length, shingles2.length)) * 100);
            
            displayResults(similarity);
        }

        function getShingles(text, size) {
            const words = text.match(/\b\w+\b/g) || [];
            if (words.length < size) return words;
            
            const shingles = [];
            for (let i = 0; i <= words.length - size; i++) {
                shingles.push(words.slice(i, i + size).join(' '));
            }
            return shingles;
        }

        function displayResults(sim) {
            const view = document.getElementById('result-view');
            const circle = document.getElementById('perc-circle');
            const summary = document.getElementById('summary-text');
            const details = document.getElementById('sub-details');

            view.style.display = 'block';
            circle.innerText = (100 - sim) + '%';
            details.innerText = `Similarity Match: ${sim}%`;

            if (sim > 40) {
                circle.style.borderColor = '#ef4444';
                circle.style.color = '#ef4444';
                summary.innerText = 'High Similarity Detected';
            } else if (sim > 10) {
                circle.style.borderColor = '#facc15';
                circle.style.color = '#facc15';
                summary.innerText = 'Moderate Overlap';
            } else {
                circle.style.borderColor = '#10b981';
                circle.style.color = '#10b981';
                summary.innerText = 'Content is Unique';
            }
        }
    </script>
</body>
</html>

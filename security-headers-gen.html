<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Headers Generator — PageGuides</title>
    <meta name="description" content="Generate secure HTTP response headers like CSP, HSTS, and X-Frame-Options to protect your website.">
    <style>
        :root {
            --primary: #ef4444;
            --primary-hover: #dc2626;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(239, 68, 68, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 1000px; }

        .header { text-align: left; margin-bottom: 3rem; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .logo span { color: var(--primary); }
        .title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 2rem; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text); font-weight: 600; font-size: 0.95rem; }
        select, input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); }

        .output-section { position: relative; margin-top: 1rem; }
        pre {
            background: #000;
            padding: 1.5rem;
            border-radius: 1rem;
            color: #ef4444;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            border: 1px solid var(--border);
            min-height: 300px;
        }

        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .copy-btn:hover { background: var(--primary); }

        .tip { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.4rem; font-style: italic; }

        footer { margin-top: 4rem; color: var(--text-dim); font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="logo">Page<span>Guides</span></a>
            <h1 class="title">Security Headers Generator</h1>
            <p class="subtitle">Protect your site from XSS, Clickjacking, and common vulnerabilities.</p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="form-group">
                    <label>Strict-Transport-Security (HSTS)</label>
                    <select id="hsts" onchange="updateAll()">
                        <option value="max-age=31536000; includeSubDomains; preload">Max Security (1 Year + Subdomains + Preload)</option>
                        <option value="max-age=31536000; includeSubDomains">Standard (1 Year + Subdomains)</option>
                        <option value="max-age=31536000">Simple (1 Year)</option>
                        <option value="off">Off (Not recommended)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Content-Security-Policy (CSP) - Script Src</label>
                    <input type="text" id="cspScripts" value="'self' https://www.google-analytics.com" placeholder="e.g. 'self' https://apis.google.com" oninput="updateAll()">
                    <p class="tip">Default is 'self' for maximum security.</p>
                </div>
                <div class="form-group">
                    <label>X-Frame-Options</label>
                    <select id="xframe" onchange="updateAll()">
                        <option value="DENY">DENY (No one can iframe your site)</option>
                        <option value="SAMEORIGIN">SAMEORIGIN (Only your site can iframe it)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>X-Content-Type-Options</label>
                    <select id="xcontent" onchange="updateAll()">
                        <option value="nosniff">nosniff (Recommended)</option>
                        <option value="off">Off</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Referrer-Policy</label>
                    <select id="referrer" onchange="updateAll()">
                        <option value="strict-origin-when-cross-origin">strict-origin-when-cross-origin (Best for SEO & Privacy)</option>
                        <option value="no-referrer">no-referrer (Max Privacy)</option>
                        <option value="same-origin">same-origin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Permissions-Policy</label>
                    <input type="text" id="permissions" value="geolocation=(), microphone=(), camera=()" oninput="updateAll()">
                </div>
            </div>

            <div class="card">
                <label>Generated Configuration (Nginx / Apache / .htaccess)</label>
                <div class="output-section">
                    <button class="copy-btn" onclick="copyCode()">Copy Code</button>
                    <pre id="output"></pre>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 PageGuides — Premium SEO Tool Suite
        </footer>
    </div>

    <script>
        function updateAll() {
            const hsts = document.getElementById('hsts').value;
            const cspScripts = document.getElementById('cspScripts').value;
            const xframe = document.getElementById('xframe').value;
            const xcontent = document.getElementById('xcontent').value;
            const referrer = document.getElementById('referrer').value;
            const permissions = document.getElementById('permissions').value;

            let code = `# Security Headers\n\n`;
            
            // Nginx Format (can be adapted)
            if (hsts !== 'off') code += `add_header Strict-Transport-Security "${hsts}" always;\n`;
            code += `add_header Content-Security-Policy "default-src 'self'; script-src ${cspScripts}; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;\n`;
            code += `add_header X-Frame-Options "${xframe}" always;\n`;
            code += `add_header X-Content-Type-Options "${xcontent}" always;\n`;
            code += `add_header Referrer-Policy "${referrer}" always;\n`;
            code += `add_header Permissions-Policy "${permissions}" always;\n`;
            code += `add_header X-XSS-Protection "1; mode=block" always;`;

            document.getElementById('output').textContent = code;
        }

        function copyCode() {
            const code = document.getElementById('output').textContent;
            navigator.clipboard.writeText(code);
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy Code', 2000);
        }

        updateAll();
    </script>
</body>
</html>

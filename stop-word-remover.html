<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Word Remover — PageGuides</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .split-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 0.95rem;
            resize: none;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--accent);
            color: #064e3b;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .stats-footer {
            display: flex;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← All Tools</a>
        
        <div class="header">
            <h1>Stop Word Remover</h1>
            <p style="color: var(--text-dim)">Clean your text for NLP, data analysis, or SEO keyword extraction by removing non-essential words.</p>
        </div>

        <div class="tool-card">
            <div class="split-layout">
                <div>
                    <label style="display:block; margin-bottom:8px; font-size:0.8rem; color:var(--text-dim);">Original Text</label>
                    <textarea id="input-text" placeholder="The quick brown fox jumps over the lazy dog..."></textarea>
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-size:0.8rem; color:var(--text-dim);">Cleaned Result</label>
                    <textarea id="output-text" readonly placeholder="Output will appear here..."></textarea>
                </div>
            </div>

            <div class="btn-container">
                <button class="btn" onclick="removeStopWords()">Remove Stop Words</button>
                <button class="btn btn-outline" onclick="copyResult()">Copy Cleaned Text</button>
            </div>

            <div class="stats-footer">
                <span id="orig-count">Original: 0 words</span>
                <span id="reduction-perc" style="color: var(--accent)">Reduction: 0%</span>
                <span id="final-count">Cleaned: 0 words</span>
            </div>
        </div>
    </div>

    <script>
        const stopWords = new Set([
            'a', 'about', 'above', 'after', 'again', 'against', 'all', 'am', 'an', 'and', 'any', 'are', 'as', 'at', 'be', 'because', 'been', 'before', 'being', 'below', 'between', 'both', 'but', 'by', 'could', 'did', 'do', 'does', 'doing', 'down', 'during', 'each', 'few', 'for', 'from', 'further', 'had', 'has', 'have', 'having', 'here', 'how', 'if', 'in', 'into', 'is', 'it', 'its', 'itself', 'just', 'more', 'most', 'my', 'myself', 'no', 'nor', 'not', 'now', 'of', 'off', 'on', 'once', 'only', 'or', 'other', 'our', 'ours', 'ourselves', 'out', 'over', 'own', 's', 'same', 'she', "she's", 'should', 'so', 'some', 'such', 'than', 'that', "that's", 'the', 'their', 'theirs', 'them', 'themselves', 'then', 'there', "there's", 'these', 'they', "they'd", "they'll", "they're", "they've", 'this', 'those', 'through', 'to', 'too', 'under', 'until', 'up', 'very', 'was', 'we', "we'd", "we'll", "we're", "we've", 'were', 'what', "what's", 'when', "when's", 'where', "where's", 'which', 'while', 'who', "who's", 'whom', 'why', "why's", 'with', 'would', 'you', "you'd", "you'll", "you're", "you've", 'your', 'yours', 'yourself', 'yourselves'
        ]);

        function removeStopWords() {
            const input = document.getElementById('input-text').value;
            if (!input.trim()) return;

            // Simple tokenize: words + non-words to preserve punctuation/formatting if possible (optional)
            // For SEO extraction usually we want just words
            const words = input.split(/\s+/);
            const originalCount = words.length;

            const cleaned = words.filter(w => !stopWords.has(w.toLowerCase().replace(/[.,!?;:()]/g, '')));
            const finalCount = cleaned.length;

            document.getElementById('output-text').value = cleaned.join(' ');
            
            // Update stats
            document.getElementById('orig-count').innerText = `Original: ${originalCount} words`;
            document.getElementById('final-count').innerText = `Cleaned: ${finalCount} words`;
            const reduction = originalCount > 0 ? Math.round(((originalCount - finalCount) / originalCount) * 100) : 0;
            document.getElementById('reduction-perc').innerText = `Reduction: ${reduction}%`;
        }

        function copyResult() {
            const out = document.getElementById('output-text');
            out.select();
            document.execCommand('copy');
            alert('Cleaned text copied!');
        }
    </script>
</body>
</html>

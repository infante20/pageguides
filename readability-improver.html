<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readability Improver — PageGuides</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        textarea {
            width: 100%;
            height: 200px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 1rem;
            margin-bottom: 20px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn {
            background: var(--accent);
            color: #064e3b;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .output-section {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight-text {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 12px;
            line-height: 1.8;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .complex-word {
            color: #f87171;
            border-bottom: 1px dashed #f87171;
            cursor: pointer;
            position: relative;
            padding: 0 2px;
            transition: all 0.2s;
        }

        .complex-word:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .complex-word::after {
            content: attr(data-suggestions);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #34d399;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            white-space: nowrap;
            display: none;
            border: 1px solid var(--accent);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .complex-word:hover::after {
            display: block;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← All Tools</a>
        
        <div class="header">
            <h1>Readability Improver</h1>
            <p style="color: var(--text-dim)">Scans for complex words and suggests simpler alternatives to make your content more accessible.</p>
        </div>

        <div class="tool-card">
            <textarea id="text-input" placeholder="Paste your content here to find complex words..."></textarea>
            <button class="btn" onclick="improveReadability()">Analyze & Suggest</button>

            <div id="output-section" class="output-section">
                <div class="highlight-text" id="highlighted-content"></div>
                
                <div class="legend">
                    <div><span class="dot" style="background: #f87171"></span> Complex word detected</div>
                    <div style="color: #34d399">Hover over words to see suggestions</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            'utilize': 'use',
            'facilitate': 'help / start',
            'implement': 'start / do',
            'subsequently': 'later / then',
            'adversely': 'badly',
            'demonstrate': 'show',
            'necessitate': 'need',
            'substantial': 'large',
            'advantageous': 'helpful',
            'compensate': 'pay',
            'disseminate': 'spread',
            'erroneous': 'wrong',
            'fundamental': 'basic',
            'illustrate': 'show',
            'leverage': 'use',
            'methodology': 'way / method',
            'notwithstanding': 'even so',
            'objective': 'goal',
            'optimum': 'best',
            'parameters': 'limits',
            'pivotal': 'crucial',
            'practically': 'nearly',
            'proximity': 'closeness',
            'remuneration': 'pay',
            'terminate': 'end',
            'ultimate': 'final',
            'visualize': 'see'
        };

        function improveReadability() {
            const input = document.getElementById('text-input').value.trim();
            if (input.length < 5) return;

            const outputDiv = document.getElementById('highlighted-content');
            const section = document.getElementById('output-section');

            // Escape HTML and split into words/whitespace preserving format
            let html = input.replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
            });

            // Replace complex words
            const words = Object.keys(dictionary);
            words.forEach(word => {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                html = html.replace(regex, (match) => {
                    return `<span class="complex-word" data-suggestions="Try: ${dictionary[word].toLowerCase()}">${match}</span>`;
                });
            });

            outputDiv.innerHTML = html.replace(/\n/g, '<br>');
            section.style.display = 'block';
        }
    </script>
</body>
</html>

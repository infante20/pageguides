<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON-LD Breadcrumb Generator — PageGuides</title>
    <meta name="description" content="Generate valid JSON-LD Breadcrumb markup to help search engines understand your site structure.">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 900px; }

        .header { text-align: left; margin-bottom: 3rem; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .logo span { color: var(--primary); }
        .title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .tool-grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem; font-weight: 500; }
        
        .breadcrumb-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            position: relative;
        }

        .breadcrumb-item .remove-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--primary); color: white; margin-bottom: 1rem; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: white; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

        .output-container { position: relative; }
        pre {
            background: #000;
            padding: 1.5rem;
            border-radius: 1rem;
            color: #10b981;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            border: 1px solid var(--border);
            min-height: 200px;
        }

        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover { background: var(--primary); }

        .visual-preview {
            margin-top: 1.5rem;
            background: white;
            color: #374151;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .visual-preview span { color: #6b7280; font-weight: normal; }
        .visual-preview a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .visual-preview a:hover { text-decoration: underline; }

        footer { margin-top: 4rem; color: var(--text-dim); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="logo">Page<span>Guides</span></a>
            <h1 class="title">Breadcrumb Generator</h1>
            <p class="subtitle">Generate accurate JSON-LD BreadcrumbList markup for Google Rich Snippets.</p>
        </header>

        <div class="tool-grid">
            <div class="card">
                <div id="breadcrumb-list">
                    <div class="breadcrumb-item" data-index="0">
                        <label>Level 1 (Home)</label>
                        <input type="text" placeholder="Page Name (e.g. Home)" value="Home" class="item-name">
                        <input type="text" placeholder="URL (e.g. https://example.com/)" value="https://example.com/" class="item-url">
                    </div>
                    <div class="breadcrumb-item" data-index="1">
                        <label>Level 2</label>
                        <input type="text" placeholder="Page Name (e.g. Blog)" value="Blog" class="item-name">
                        <input type="text" placeholder="URL (e.g. https://example.com/blog)" value="https://example.com/blog" class="item-url">
                        <button class="remove-btn" onclick="removeItem(1)">×</button>
                    </div>
                </div>

                <button class="btn btn-secondary" onclick="addItem()" style="margin-bottom: 2rem;">+ Add Level</button>
            </div>

            <div class="card output-container">
                <label>JSON-LD Code</label>
                <button class="copy-btn" onclick="copyCode()">Copy Code</button>
                <pre id="output"></pre>

                <label style="margin-top: 2rem;">Visual Preview</label>
                <div class="visual-preview" id="preview">
                    <a href="#">Home</a> <span>›</span> <a href="#">Blog</a>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 PageGuides — Premium SEO Tool Suite
        </footer>
    </div>

    <script>
        let items = [
            { name: 'Home', url: 'https://example.com/' },
            { name: 'Blog', url: 'https://example.com/blog' }
        ];

        function addItem() {
            items.push({ name: '', url: '' });
            renderItems();
            updateOutput();
        }

        function removeItem(index) {
            if (items.length <= 1) return;
            items.splice(index, 1);
            renderItems();
            updateOutput();
        }

        function renderItems() {
            const list = document.getElementById('breadcrumb-list');
            list.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'breadcrumb-item';
                div.innerHTML = `
                    <label>Level ${index + 1} ${index === 0 ? '(ROOT)' : ''}</label>
                    <input type="text" placeholder="Page Name" value="${item.name}" class="item-name" oninput="updateItem(${index}, 'name', this.value)">
                    <input type="text" placeholder="URL" value="${item.url}" class="item-url" oninput="updateItem(${index}, 'url', this.value)">
                    ${index > 0 ? `<button class="remove-btn" onclick="removeItem(${index})">×</button>` : ''}
                `;
                list.appendChild(div);
            });
        }

        function updateItem(index, field, value) {
            items[index][field] = value;
            updateOutput();
            updateVisualPreview();
        }

        function updateOutput() {
            const schema = {
                "@context": "https://schema.org",
                "@type": "BreadcrumbList",
                "itemListElement": items.map((item, index) => ({
                    "@type": "ListItem",
                    "position": index + 1,
                    "name": item.name || "Untitled",
                    "item": item.url || "#"
                }))
            };

            document.getElementById('output').textContent = JSON.stringify(schema, null, 4);
        }

        function updateVisualPreview() {
            const preview = document.getElementById('preview');
            preview.innerHTML = items.map((item, index) => {
                const separator = index < items.length - 1 ? ' <span>›</span> ' : '';
                return `<a href="${item.url || '#'}">${item.name || '...'}</a>${separator}`;
            }).join('');
        }

        function copyCode() {
            const code = document.getElementById('output').textContent;
            navigator.clipboard.writeText(code);
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.background = '#22c55e';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 2000);
        }

        // Initial render
        updateOutput();
    </script>
</body>
</html>
